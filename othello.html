<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>계약서 열람</title>

  <style>
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 50% 30%, #5a0012 0%, #2b0007 60%, #140003 100%);
      color: #f5d28a;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 35px;
      font-size: 34px;
      color: #f5d28a;
    }

    .paper {
      background: rgba(0,0,0,0.35);
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(245,210,138,0.35);
      box-shadow: 0 30px 70px rgba(0,0,0,0.55);
    }

    .paper img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    .back {
      display: inline-block;
      margin-top: 32px;
      padding: 12px 26px;
      border-radius: 999px;
      background: #f5d28a;
      color: #3a0816;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="wrap">
    <h1>배우 계약서 열람</h1>

    <div class="paper">
      <img src="othello.png" alt="배조연 계약서">
    </div>

    <a href="index.html" class="back">← 메인으로 돌아가기</a>
  </div>

</body>
</html>
