<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>극단 동화나라</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #1a0308, #4b0f1f);
      color: #f8e7c2;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* 상단바 */
    .topbar {
      height: 82px;
      padding: 0 48px;
      display: flex;
      align-items: center;
      position: relative;
      background: rgba(20, 0, 5, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 900;
      z-index: 2;
    }

    .logo-mark {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #fff7e6;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #f5d28a;
    }

    /* 메뉴 중앙 */
    .nav {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 48px;
      font-weight: 900;
    }

    .nav a {
      color: #e8d6a8;
    }

    .nav a:hover {
      color: #f5d28a;
    }

    /* 메인 영역 */
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
    }

    .welcome {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 36px;
      color: #f5d28a;
    }

    .main-image {
      width: 90%;
      max-width: 1200px;
      height: 55vh;
      margin: 0 auto;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 28px 60px rgba(0,0,0,0.42);
      border: 1px solid rgba(245,210,138,0.28);
      background: #111;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .intro {
      margin-top: 50px;
    }

    .intro h1 {
      font-size: 56px; /* 🔥 크게 */
      margin-bottom: 12px;
      color: #f5d28a;
      letter-spacing: 3px;
    }

    .intro p {
      font-size: 18px;
      color: #e7d3a5;
    }

    /* 바로가기 */
    .quick {
      max-width: 1100px;
      margin: 100px auto;
      padding: 0 20px;
    }

    .quick h2 {
      text-align: center;
      margin-bottom: 50px;
      color: #f5d28a;
      font-size: 34px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 25px;
    }

    .quick-card {
      background: #fff7e6;
      color: #1b1114;
      padding: 40px 30px;
      border-radius: 18px;
      transition: 0.35s;
      display: block;
      min-height: 230px;
      cursor: pointer;
    }

    .quick-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    }

    .quick-num {
      font-size: 16px;
      font-weight: 900;
      color: #8a1538;
      margin-bottom: 18px;
    }

    .quick-card h3 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    .quick-card p {
      font-size: 16px;
      color: #5a4a3a;
      line-height: 1.7;
    }

    /* 반응형 */
    @media (max-width: 900px) {
      .nav { display: none; }
      .quick-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .quick-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-mark">🎭</div>
    극단 동화나라
  </div>

  <nav class="nav">
    <a href="index.html">메인</a>
    <a href="#quick">바로가기</a>
    <a href="show.html">공연 안내</a>
    <a href="archive.html">자료실</a>
  </nav>
</header>

<main>

  <section class="hero">
    <div class="welcome">극단 동화나라 홈페이지에 오신걸 환영합니다</div>

    <div class="main-image">
      <img src="donghwa.png">
    </div>

    <div class="intro">
      <h1>DONGHWA NARA</h1>
      <p>환상과 현실이 만나는 무대, 극단 동화나라</p>
    </div>
  </section>

  <section id="quick" class="quick">
    <h2>바로가기</h2>

    <div class="quick-grid">

      <a href="theater.html" class="quick-card">
        <div class="quick-num">01</div>
        <h3>극단 소개</h3>
        <p>극단의 역사와 철학을 확인할 수 있습니다.</p>
      </a>

      <a href="show.html" class="quick-card">
        <div class="quick-num">02</div>
        <h3>공연 안내</h3>
        <p>현재 진행 중인 공연과 일정을 확인할 수 있습니다.</p>
      </a>

      <a href="staff.html" class="quick-card">
        <div class="quick-num">03</div>
        <h3>배우 / 스태프 소개</h3>
        <p>극단의 배우와 스태프를 소개합니다.</p>
      </a>

      <a href="archive.html" class="quick-card">
        <div class="quick-num">04</div>
        <h3>자료실</h3>
        <p>공지사항과 포스터, 캐스팅 정보를 확인할 수 있습니다.</p>
      </a>

    </div>
  </section>

</main>

</body>
</html>
