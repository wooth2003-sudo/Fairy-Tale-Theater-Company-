<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>극단 동화나라</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #1a0308, #4b0f1f);
      color: #fff7e6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* 상단 */
    .topbar {
      height: 82px;
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(20, 0, 5, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 900;
    }

    .logo-mark {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #fff7e6;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #f5d28a;
    }

    .nav {
      display: flex;
      gap: 40px;
      font-weight: 800;
    }

    .nav a:hover {
      color: #f5d28a;
    }

    /* 메인 영역 */
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
    }

    .main-image {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    .main-image img {
      width: 100%;
      height: 70vh;
      object-fit: cover;
      display: block;
    }

    .intro {
      margin-top: 50px;
    }

    .intro h1 {
      font-size: 42px;
      margin: 0 0 10px;
      color: #f5d28a;
      letter-spacing: 2px;
    }

    .intro p {
      font-size: 18px;
      color: #f7e6c6;
      margin: 0;
    }

    /* 바로가기 */
    .quick {
      max-width: 1100px;
      margin: 90px auto;
      padding: 0 20px;
    }

    .quick h2 {
      text-align: center;
      margin-bottom: 40px;
      color: #f5d28a;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .quick-card {
      background: #fff7e6;
      color: #1b1114;
      padding: 25px;
      border-radius: 16px;
      transition: 0.3s;
      display: block;
    }

    .quick-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .quick-num {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 10px;
      color: #8a1538;
    }

    .quick-card h3 {
      margin: 0 0 10px;
    }

    .quick-card p {
      font-size: 14px;
      color: #555;
    }

    /* 반응형 */
    @media (max-width: 800px) {
      .nav { display: none; }

      .quick-grid {
        grid-template-columns: 1fr;
      }

      .main-image img {
        height: 50vh;
      }
    }

  </style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-mark">🎭</div>
    극단 동화나라
  </div>

  <nav class="nav">
    <a href="index.html">메인</a>
    <a href="#quick">바로가기</a>
    <a href="show.html">공연 안내</a>
    <a href="archive.html">자료실</a>
  </nav>
</header>

<main>

  <!-- 메인 -->
  <section class="hero">

    <div class="main-image">
      <img src="donghwa.png">
    </div>

    <div class="intro">
      <h1>DONGHWA NARA</h1>
      <p>환상과 현실이 만나는 무대, 극단 동화나라</p>
    </div>

  </section>

  <!-- 바로가기 -->
  <section id="quick" class="quick">

    <h2>바로가기</h2>

    <div class="quick-grid">

      <a href="theater.html" class="quick-card">
        <div class="quick-num">01</div>
        <h3>극단 소개</h3>
        <p>극단의 역사와 철학을 확인할 수 있습니다.</p>
      </a>

      <a href="show.html" class="quick-card">
        <div class="quick-num">02</div>
        <h3>공연 안내</h3>
        <p>현재 진행 중인 공연과 일정을 확인할 수 있습니다.</p>
      </a>

      <a href="actor.html" class="quick-card">
        <div class="quick-num">03</div>
        <h3>배우 / 스태프 소개</h3>
        <p>극단의 배우와 스태프를 소개합니다.</p>
      </a>

      <a href="archive.html" class="quick-card">
        <div class="quick-num">04</div>
        <h3>자료실</h3>
        <p>공지사항과 포스터, 캐스팅 정보를 확인할 수 있습니다.</p>
      </a>

    </div>

  </section>

</main>

</body>
</html>
