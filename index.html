<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>극단 동화나라</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #1a0308, #4b0f1f);
      color: #fff7e6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      height: 82px;
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(20, 0, 5, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 900;
    }

    .logo-mark {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #fff7e6;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #f5d28a;
    }

    .nav {
      display: flex;
      gap: 40px;
      font-weight: 800;
    }

    .nav a:hover {
      color: #f5d28a;
    }

    .hero {
      text-align: center;
      padding: 80px 20px 40px;
    }

    .welcome {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 36px;
      color: #fff7e6;
    }

    .main-image {
      width: 90%;
      max-width: 1200px;
      height: 55vh;
      margin: 0 auto;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 28px 60px rgba(0,0,0,0.42);
      border: 1px solid rgba(245,210,138,0.28);
      background: #111;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .intro {
      margin-top: 40px;
    }

    .intro h1 {
      font-size: 42px;
      margin: 0 0 12px;
      color: #f5d28a;
      letter-spacing: 2px;
    }

    .intro p {
      font-size: 18px;
      color: #f7e6c6;
      margin: 0;
    }

    .quick {
      max-width: 1100px;
      margin: 90px auto 120px;
      padding: 0 20px;
    }

    .quick h2 {
      text-align: center;
      margin-bottom: 40px;
      color: #f5d28a;
      font-size: 30px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .quick-card {
      background: #fff7e6;
      color: #1b1114;
      padding: 28px 25px;
      border-radius: 16px;
      transition: 0.3s;
      display: block;
      min-height: 175px;
    }

    .quick-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .quick-num {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 16px;
      color: #8a1538;
    }

    .quick-card h3 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .quick-card p {
      font-size: 15px;
      line-height: 1.6;
      color: #555;
      margin: 0;
    }

    @media (max-width: 900px) {
      .topbar { padding: 0 20px; }
      .nav { display: none; }
      .main-image { width: 92%; height: 300px; }
      .quick-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .quick-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <a href="index.html" class="logo">
      <div class="logo-mark">🎭</div>
      <div>극단 동화나라</div>
    </a>

    <nav class="nav">
      <a href="index.html">메인</a>
      <a href="#quick">바로가기</a>
      <a href="show.html">공연 안내</a>
      <a href="archive.html">자료실</a>
    </nav>
  </header>

  <main>

    <section class="hero">
      <div class="welcome">극단 동화나라 홈페이지에 오신걸 환영합니다</div>

      <div class="main-image">
        <img src="donghwa.png" alt="극단 동화나라 무대 이미지">
      </div>

      <div class="intro">
        <h1>DONGHWA NARA</h1>
        <p>환상과 현실이 만나는 무대, 극단 동화나라</p>
      </div>
    </section>

    <section id="quick" class="quick">
      <h2>바로가기</h2>

      <div class="quick-grid">

        <a href="theater.html" class="quick-card">
          <div class="quick-num">01</div>
          <h3>극단 소개</h3>
          <p>극단의 역사와 철학을 확인할 수 있습니다.</p>
        </a>

        <a href="show.html" class="quick-card">
          <div class="quick-num">02</div>
          <h3>공연 안내</h3>
          <p>현재 진행 중인 공연과 일정을 확인할 수 있습니다.</p>
        </a>

        <a href="staff.html" class="quick-card">
          <div class="quick-num">03</div>
          <h3>배우 / 스태프 소개</h3>
          <p>극단의 배우와 스태프를 소개합니다.</p>
        </a>

        <a href="archive.html" class="quick-card">
          <div class="quick-num">04</div>
          <h3>자료실</h3>
          <p>공지사항과 포스터, 캐스팅 정보를 확인할 수 있습니다.</p>
        </a>

      </div>
    </section>

  </main>

</body>
</html>
