<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로미오와 줄리엣 캐스팅표</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #1a0308, #4b0f1f);
      color: #f5d28a;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .topbar {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(20, 0, 5, 0.95);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 60px 20px;
      text-align: center;
    }

    .title {
      font-size: 36px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 16px;
      color: #f7e6c6;
      margin-bottom: 40px;
    }

    .cast-box {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      border: 1px solid rgba(245,210,138,0.4);
      background: #120407;
    }

    .cast-box img {
      width: 100%;
      display: block;
    }

    .back-btn {
      margin-top: 40px;
      display: inline-block;
      padding: 12px 26px;
      border-radius: 999px;
      background: #f5d28a;
      color: #3a0816;
      font-weight: 900;
      transition: 0.3s;
      text-decoration: none;
    }

    .back-btn:hover {
      background: #fff0c4;
    }
  </style>
</head>

<body>

  <div class="topbar">
    로미오와 줄리엣 캐스팅표
  </div>

  <div class="container">

    <div class="title">CASTING BOARD</div>
    <div class="sub">2026년 9월 25일 특별 공연 출연진 안내</div>

    <div class="cast-box">
      <img src="cas.png" alt="로미오와 줄리엣 캐스팅표">
    </div>

    <a href="archive.html" class="back-btn">← 자료실로 돌아가기</a>

  </div>

</body>
</html>
