
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>자료실 | 극단 동화나라</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #1a0308, #4b0f1f);
      color: #fff7e6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      height: 82px;
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(35, 5, 14, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.14);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 26px;
      font-weight: 900;
    }

    .logo-mark {
      width: 50px;
      height: 50px;
      border: 3px solid #f5d28a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff7e6;
    }

    .nav {
      display: flex;
      gap: 40px;
      font-weight: 800;
    }

    .nav a:hover {
      color: #f5d28a;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 70px 24px 100px;
    }

    .page-title {
      text-align: center;
      margin-bottom: 42px;
    }

    .page-title h1 {
      font-size: 42px;
      margin: 0 0 12px;
      color: #f5d28a;
    }

    .page-title p {
      margin: 0;
      color: #f7e6c6;
    }

    .hero-banner {
      height: 330px;
      border-radius: 18px;
      margin-bottom: 42px;
      overflow: hidden;
      border: 1px solid rgba(245,210,138,0.35);
      box-shadow: 0 24px 55px rgba(0,0,0,0.35);
    }

    .hero-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .board {
      background: #fff7e6;
      color: #1b1114;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.32);
      border: 1px solid rgba(245,210,138,0.5);
    }

    .board-head {
      display: grid;
      grid-template-columns: 110px 1fr 150px 150px 110px;
      padding: 18px 24px;
      background: #4b0f1f;
      color: #f5d28a;
      font-weight: 900;
      text-align: center;
    }

    .board-row {
      display: grid;
      grid-template-columns: 110px 1fr 150px 150px 110px;
      padding: 20px 24px;
      border-bottom: 1px solid #eadcc2;
      align-items: center;
      text-align: center;
    }

    .board-row:hover {
      background: #f3e6cf;
    }

    .title-cell {
      text-align: left;
      font-weight: 800;
    }

    .title-cell a:hover {
      color: #8a1538;
      text-decoration: underline;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      color: #fff7e6;
    }

    .notice { background: #b00020; }
    .poster { background: #6b1230; }
    .cast { background: #7d5a1d; }
    .file { background: #2f2730; }

    .important { color: #b00020; }
  </style>
</head>

      <div>공연기획팀</div>

    </div>

    <!-- 안내 -->

      <div class="title-cell">
        <a href="#">공연 관람 및 티켓 수령 안내</a>
      </div>
      <div>운영팀</div>
      <div>2026-09-08</div>

  </section>

</main>

</body>
</html>
