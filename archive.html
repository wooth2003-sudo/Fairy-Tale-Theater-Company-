<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>자료실 | 극단 동화나라</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #1a0308, #4b0f1f);
      color: #fff7e6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: rgba(35, 5, 14, 0.95);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 26px;
      font-weight: 900;
    }

    .logo-mark {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #fff7e6;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #f5d28a;
    }

    .nav {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      font-weight: 900;
    }

    .nav a:hover {
      color: #f5d28a;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px 100px;
    }

    .hero {
      height: 300px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 40px;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .board {
      background: #fff7e6;
      border-radius: 16px;
      overflow: hidden;
      color: #1b1114;
    }

    .head, .row {
      display: grid;
      grid-template-columns: 100px 1fr 150px 150px 100px;
      padding: 18px;
      align-items: center;
      text-align: center;
    }

    .head {
      background: #4b0f1f;
      color: #f5d28a;
      font-weight: 900;
    }

    .row {
      border-bottom: 1px solid #ddd;
    }

    .row:hover {
      background: #f3e6cf;
    }

    .title {
      text-align: left;
      font-weight: 800;
    }

    .title a:hover {
      color: #8a1538;
      text-decoration: underline;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 20px;
      color: white;
      font-size: 13px;
      font-weight: 900;
    }

    .notice { background: #b00020; }
    .poster { background: #6b1230; }
    .cast { background: #7d5a1d; }
    .file { background: #333; }

    .important {
      color: #b00020;
    }

  </style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-mark">🎭</div>
    극단 동화나라
  </div>

  <nav class="nav">
    <a href="index.html">메인</a>
    <a href="index.html#quick">바로가기</a>
    <a href="show.html">공연 안내</a>
    <a href="archive.html">자료실</a>
  </nav>
</header>

<main class="page">

  <!-- 상단 이미지 -->
  <div class="hero">
    <img src="dan123.png">
  </div>

  <div class="board">

    <div class="head">
      <div>번호</div>
      <div>제목</div>
      <div>작성자</div>
      <div>작성일</div>
      <div>조회수</div>
    </div>

    <!-- 공지 -->
    <div class="row">
      <div><span class="badge notice">공지</span></div>
      <div class="title important">
        <a href="notice-accident.html">2026년 9월 25일 공연 중 사고에 대한 안내문</a>
      </div>
      <div>운영팀</div>
      <div>2026-09-25</div>
      <div>2847</div>
    </div>

    <!-- 포스터 -->
    <div class="row">
      <div><span class="badge poster">포스터</span></div>
      <div class="title">
        <a href="sss.html">[특별공연] 로미오와 줄리엣 공식 포스터</a>
      </div>
      <div>홍보팀</div>
      <div>2026-09-12</div>
      <div>921</div>
    </div>

    <!-- 캐스팅표 -->
    <div class="row">
      <div><span class="badge cast">캐스팅</span></div>
      <div class="title">
        <a href="cas.html">로미오와 줄리엣 캐스팅표 안내</a>
      </div>
      <div>공연기획팀</div>
      <div>2026-09-10</div>
      <div>1184</div>
    </div>

    <!-- 안내 -->
    <div class="row">
      <div><span class="badge file">자료</span></div>
      <div class="title">
        <a href="#">공연 관람 및 티켓 수령 안내</a>
      </div>
      <div>운영팀</div>
      <div>2026-09-08</div>
      <div>654</div>
    </div>

  </div>

</main>

</body>
</html>
